<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf6ff"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <style>
      .ring{ fill:none; stroke:#7411CC; stroke-opacity:0.08; stroke-width:2; }
      .ring2{ fill:none; stroke:#7411CC; stroke-opacity:0.06; stroke-width:2; }
      .ring3{ fill:none; stroke:#7411CC; stroke-opacity:0.04; stroke-width:2; }
    </style>
  </defs>

  <!-- soft background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- concentric rings, slightly off-center to the right like the sample -->
  <g filter="url(#soft)" transform="translate(0,0)">
    <!-- center point around 60% x, 46% y then scale to make gentle ellipse -->
    <g transform="translate(960,414) scale(1.05,1)">
      <circle r="120" class="ring"/>
      <circle r="200" class="ring"/>
      <circle r="280" class="ring"/>
      <circle r="360" class="ring2"/>
      <circle r="460" class="ring2"/>
      <circle r="560" class="ring3"/>
      <circle r="680" class="ring3"/>
    </g>
  </g>
</svg>
